<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mor Bazar - Hyperlocal Marketplace</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="theme-{% if session.get('role') == 'vendor' %}vendor{% elif session.get('role') == 'delivery' %}delivery{% elif session.get('role') == 'admin' %}admin{% else %}customer{% endif %}">



    <div class="app-container">
        <!-- Render page contents -->
        {% block content %}{% endblock %}
    </div>

    <!-- Dropdown Toggle Script -->
    <script>
        function toggleDropdown(event, id) {
            event.preventDefault();
            event.stopPropagation();
            
            // Hide all other dropdowns
            document.querySelectorAll('.glass-dropdown').forEach(el => {
                if (el.id !== id) el.style.display = 'none';
            });
            
            // Toggle current
            const dropdown = document.getElementById(id);
            if (dropdown.style.display === 'none' || !dropdown.style.display) {
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }
        
        // Click outside closes dropdowns
        window.addEventListener('click', () => {
            document.querySelectorAll('.glass-dropdown').forEach(el => {
                el.style.display = 'none';
            });
        });
    </script>
</body>
</html>
